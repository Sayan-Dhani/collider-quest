name: Deploy to GitHub Pages

# NOTE: GitHub Pages requires a paid plan for PRIVATE repositories. While this
# repo is private on the free plan, this workflow is manual-only (workflow_dispatch)
# so it does not fail on every push. To enable automatic deploys, either make the
# repo public or upgrade to GitHub Pro, enable Pages (Settings > Pages > Source:
# GitHub Actions), then re-add the `push` trigger below:
#
#   push:
#     branches: [main]
#
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the static site (index.html at the root).
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
